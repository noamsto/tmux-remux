version: 2
builds:
  - id: tmux-state
    main: ./cmd/tmux-state
    binary: tmux-state
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
archives:
  - name_template: "tmux-state_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
checksum:
  name_template: checksums.txt
